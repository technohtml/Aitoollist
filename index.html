function getTypeBadge(type) {
    if(type === "free") return '<span class="badge-free">💰 Free</span>';
    if(type === "paid") return '<span class="badge-paid">💳 Paid</span>';
    return '<span class="badge-freemium">🎁 Freemium</span>';
}

function renderStars(rating) {
    let full = Math.floor(rating);
    let half = rating % 1 >= 0.5 ? 1 : 0;
    let empty = 5 - full - half;
    return '⭐'.repeat(full) + (half ? '½' : '') + '☆'.repeat(empty) + ` ${rating}`;
}

let currentSearch = "";
let currentCategory = "all";

function renderAll() {
    let container = document.getElementById("categoriesContainer");
    let statsDiv = document.getElementById("stats");
    let total = 0;
    for(let cat in fullAIDatabase) total += fullAIDatabase[cat].length;
    
    let html = "";
    let visibleCount = 0;
    
    for(let [catName, ais] of Object.entries(fullAIDatabase)) {
        if(currentCategory !== "all" && currentCategory !== catName) continue;
        
        let filtered = ais.filter(ai => 
            ai.name.toLowerCase().includes(currentSearch.toLowerCase()) ||
            ai.origin.toLowerCase().includes(currentSearch.toLowerCase())
        );
        if(filtered.length === 0) continue;
        visibleCount += filtered.length;
        
        html += `<div class="category-section">`;
        html += `<h2 class="category-title">${catName} (${filtered.length})</h2>`;
        html += `<div class="card-grid">`;
        
        filtered.forEach(ai => {
            html += `
                <div class="ai-card">
                    <div class="card-header">
                        <span class="ai-name">${ai.name}</span>
                        <span class="rating">${renderStars(ai.rating)}</span>
                    </div>
                    <div>${getTypeBadge(ai.type)}</div>
                    <div class="detail">📍 ${ai.origin} | 📅 ${ai.release}</div>
                    <div class="detail">💰 <span class="price">${ai.price}</span></div>
                    <div class="features">
                        ${ai.features.map(f => `<span class="feature-badge">${f}</span>`).join('')}
                        ${ai.features.length === 0 ? '<span class="feature-badge">🧠 Core AI</span>' : ''}
                    </div>
                    <a href="${ai.url}" target="_blank" class="link-btn">🔗 Visit Website →</a>
                    <div class="free-info">✨ Free: ${ai.free}</div>
                </div>
            `;
        });
        html += `</div></div>`;
    }
    container.innerHTML = html;
    statsDiv.innerHTML = `📊 ${visibleCount} AI Tools Found (Total ${total}+ AI) • Works on Windows, iOS, Android, Mac, Linux`;
}

function buildCategoryFilter() {
    let filterDiv = document.getElementById("categoryFilter");
    let btns = `<button class="cat-btn active" data-cat="all">📌 All Categories</button>`;
    for(let cat in fullAIDatabase) {
        btns += `<button class="cat-btn" data-cat="${cat}">${cat}</button>`;
    }
    filterDiv.innerHTML = btns;
    
    document.querySelectorAll(".cat-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentCategory = btn.dataset.cat;
            renderAll();
        });
    });
}

document.getElementById("searchInput").addEventListener("input", (e) => {
    currentSearch = e.target.value;
    renderAll();
});

buildCategoryFilter();
renderAll();
</script>
